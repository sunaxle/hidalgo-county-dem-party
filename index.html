<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance | Hidalgo County Democrats</title>
  <meta name="description" content="The Hidalgo County Democratic Party website is temporarily under maintenance.">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    
    .maintenance-card {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 4rem 3rem;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    
    .maintenance-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
    }

    h1 {
      color: #fff;
      font-size: 2rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2.5rem;
      font-size: 1.05rem;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    input[type="password"] {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 1rem;
      border-radius: 8px;
      font-size: 1rem;
      text-align: center;
      letter-spacing: 2px;
      transition: all 0.3s ease;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
    }

    .btn-unlock {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 1rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    .btn-unlock:hover {
      background: #0ea5e9;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
    }

    .error-msg {
      color: #ef4444;
      font-size: 0.9rem;
      margin-top: 1rem;
      display: none;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .footer-note {
      position: absolute;
      bottom: 2rem;
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
    }
  </style>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Inter:wght@400;600;800&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/state_party_clone.css" />

</head>
<body class="tx-clone">
  <!-- Dynamic Background Shapes -->
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>

  <div class="maintenance-card">
    <div class="maintenance-icon">🛡️</div>
    <h1>Site Under Maintenance</h1>
    <p>We are currently updating our systems for the 2026 cycle. Please check back later. Authorized personnel may log in below.</p>
    
    <div class="auth-form">
      <input type="password" id="accessCode" placeholder="Enter Access Code">
      <button class="btn-unlock" onclick="verifyAccess()">Unlock Workspace</button>
      <div class="error-msg" id="errorMsg">Invalid Credentials</div>
    </div>
  </div>

  <div class="footer-note">Hidalgo County Democratic Party &copy; 2026</div>

  <script>
    // Execute bypass check natively inside the document to prevent FOUC (Flash of Unstyled Content)
    if (sessionStorage.getItem('hcdp_maintenance_access') === 'granted_PC26') {
        window.location.href = 'home.html';
    }

    function verifyAccess() {
      const code = document.getElementById('accessCode').value;
      const errorMsg = document.getElementById('errorMsg');
      
      // The secure token requested by the user
      if (code === 'PC26') {
        // Grant persistent session access to bypass the global gatekeeper
        sessionStorage.setItem('hcdp_maintenance_access', 'granted_PC26');
        window.location.href = 'home.html';
      } else {
        errorMsg.style.display = 'block';
        document.getElementById('accessCode').value = '';
        setTimeout(() => {
          errorMsg.style.display = 'none';
        }, 3000);
      }
    }

    // Allow "Enter" key submission
    document.getElementById('accessCode').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        verifyAccess();
      }
    });
  </script>
</body>
</html>
