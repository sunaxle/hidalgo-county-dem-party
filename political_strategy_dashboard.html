<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Political Strategy Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      background: #020617;
      background-attachment: fixed;
      color: #f8fafc;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      overflow-x: auto;
      overflow-y: auto;
      position: relative;
    }
    /* Digital Corkboard Canvas */
    .canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      min-width: 100vw;
      min-height: 2500px; /* Big enough for all content */
    }
    .grid-bg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at 50% 50%, rgba(30, 41, 59, 1) 0%, rgba(2, 6, 23, 1) 100%);
      background-size: cover;
      pointer-events: none;
      z-index: 0;
    }
    .grid-pattern {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background-size: 60px 60px;
      background-image: 
        linear-gradient(to right, rgba(148, 163, 184, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(148, 163, 184, 0.05) 1px, transparent 1px);
      z-index: 1;
      pointer-events: none;
    }
    .svg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }
    .svg-line {
      fill: none;
      stroke-width: 3;
      stroke-dasharray: 8;
      animation: dash 30s linear infinite;
      filter: drop-shadow(0 0 5px currentColor);
    }
    @keyframes dash {
      to { stroke-dashoffset: -1000; }
    }
    /* The Center Hub */
    .hub-container {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      width: 280px;
      height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(16px);
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(56, 189, 248, 0.2), inset 0 0 20px rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(56, 189, 248, 0.3);
    }
    .hub-circle {
      position: absolute;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      pointer-events: none;
    }
    .hub-circle circle {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
    }
    .hub-bg { stroke: rgba(255, 255, 255, 0.1); }
    .hub-progress {
      stroke: #38bdf8;
      transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      filter: drop-shadow(0 0 10px #38bdf8);
    }
    .hub-content {
      text-align: center;
      z-index: 2;
    }
    .hub-label {
      font-size: 0.75rem;
      font-weight: 800;
      color: #94a3b8;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .hub-value {
      font-size: 4rem;
      font-weight: 900;
      background: -webkit-linear-gradient(45deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 15px;
    }
    .hub-controls {
      display: flex;
      gap: 15px;
    }
    .hub-btn {
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.4);
      color: #38bdf8;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .hub-btn:hover {
      background: #38bdf8;
      color: #0f172a;
      box-shadow: 0 0 15px #38bdf8;
    }

    /* Draggable Nodes */
    .node-card {
      position: absolute;
      width: 240px;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 16px;
      z-index: 10;
      cursor: grab;
      user-select: none;
      transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.2s ease-out;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      /* Anti-gravity floating effect normally applied, but we pause it when dragging */
      animation: float 6s ease-in-out infinite;
    }
    .node-card.dragging {
      cursor: grabbing;
      opacity: 0.9;
      transform: scale(1.05);
      animation: none;
      z-index: 100;
    }
    .node-card.selected {
      border-color: #38bdf8;
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
    }
    .node-card:not(.dragging):hover {
      transform: translateY(-5px) scale(1.02);
      border-color: rgba(255, 255, 255, 0.3);
    }
    .node-color-indicator {
      position: absolute;
      top: -1px;
      left: 16px;
      right: 16px;
      height: 4px;
      border-radius: 4px;
    }
    .node-democrat .node-color-indicator { background: linear-gradient(90deg, #3b82f6, #60a5fa); box-shadow: 0 0 10px #3b82f6; }
    .node-republican .node-color-indicator { background: linear-gradient(90deg, #ef4444, #f87171); box-shadow: 0 0 10px #ef4444; }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .node-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .node-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #94a3b8;
      border: 2px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }
    .node-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .node-info h3 { font-size: 1rem; font-weight: 800; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
    .node-info p { font-size: 0.75rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; margin-top: 2px;}
    
    .node-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 1px;
      background: rgba(255,255,255,0.05);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.7);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .modal-content {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      width: 100%;
      max-width: 600px;
      padding: 30px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(56, 189, 248, 0.1);
      transform: scale(0.95) translateY(20px);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.active .modal-content {
      transform: scale(1) translateY(0);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 25px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 20px;
    }
    .modal-title-area {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .modal-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #334155;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 800; border: 2px solid rgba(255,255,255,0.1);
    }
    .modal-title h2 { font-size: 1.5rem; font-weight: 900; }
    .modal-title p { color: #94a3b8; font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
    .btn-close {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #94a3b8;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .btn-close:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 25px;
    }
    .metric-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 15px;
    }
    .metric-card label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 800;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .metric-input {
      width: 100%;
      background: transparent;
      border: none;
      color: #f8fafc;
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      outline: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 5px;
      transition: border-color 0.2s;
    }
    .metric-input:focus {
      border-color: #38bdf8;
    }
    
    .notes-section label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      font-weight: 800;
      color: #94a3b8;
      margin-bottom: 10px;
    }
    .notes-textarea {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      color: #f8fafc;
      font-family: 'Montserrat', sans-serif;
      min-height: 120px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    .notes-textarea:focus { border-color: #38bdf8; }
    
    .top-brand {
      position: fixed;
      top: 30px;
      left: 40px;
      z-index: 50;
    }
    .top-brand h1 {
      font-weight: 900;
      font-size: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .top-brand p { color: #38bdf8; font-weight: 600; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; }

  </style>
</head>

    const ProgressHub = ({ progress, setProgress }) => {
      const radius = 130;
      const circumference = 2 * Math.PI * radius;
      const strokeDashoffset = circumference - (progress / 100) * circumference;

        dragStartPos.current = {
          x: e.clientX - node.x,
          y: e.clientY - node.y
        };
        onSelect(node);
        e.stopPropagation();
      };

      useEffect(() => {
        const handleMouseMove = (e) => {
          if (!isDragging) return;
          const newX = e.clientX - dragStartPos.current.x;
          const newY = e.clientY - dragStartPos.current.y;
          onDrag(node.id, newX, newY);
        };

        const handleMouseUp = () => {
          setIsDragging(false);
        };

        if (isDragging) {
          window.addEventListener('mousemove', handleMouseMove);
          window.addEventListener('mouseup', handleMouseUp);
        }

        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('mouseup', handleMouseUp);
        };
      }, [isDragging, node.id, onDrag]);

      const floatDelay = `-${parseInt(node.id) * 0.7}s`;

      return (
        <div 
          ref={nodeRef}
          className={`node-card ${isDragging ? 'dragging' : ''} ${isSelected ? 'selected' : ''} node-${node.party}`}
          style={{ left: `${node.x}px`, top: `${node.y}px`, animationDelay: floatDelay }}
          onMouseDown={handleMouseDown}
        >
          <div className="node-color-indicator"></div>
          <div className="node-header">
            <div className="node-avatar">
              {node.name.split(' ').map(n => n[0]).join('')}
            </div>
            <div className="node-info">
              <h3>{node.name}</h3>
              <p>{node.role}</p>
              <div className="node-badge" style={{color: node.party === 'democrat' ? '#60a5fa' : '#f87171'}}>
                {node.party === 'democrat' ? 'DEM' : 'REP'}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const SVGConnections = ({ nodes, connections }) => {
      return (
        <svg className="svg-layer">
          <defs>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
          </defs>
          {connections.map((conn, idx) => {
            const source = nodes.find(n => n.id === conn.source);
            const target = nodes.find(n => n.id === conn.target);
            if (!source || !target) return null;
            
            const startX = source.x + 120; // center of node approx
            const startY = source.y + 45;
            const endX = target.x + 120;
            const endY = target.y + 45;
            
            // Simple cubic bezier curve logic for organic lines
            const dx = endX - startX;
            const dy = endY - startY;
            const cp1x = startX + dx * 0.5;
            const cp1y = startY;
            const cp2x = startX + dx * 0.5;
            const cp2y = endY;

            return (
              <path 
                key={idx}
                d={`M ${startX} ${startY} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${endX} ${endY}`}
                className="svg-line"
                style={{ stroke: conn.color }}
              />
            )
          })}
        </svg>
      );
    }

    const Modal = ({ node, onClose, onUpdateNode }) => {
      if (!node) return null;

      const [localData, setLocalData] = useState({...node});

      // Reset local state if node prop changes
      useEffect(() => {
        setLocalData({...node});
      }, [node]);

      const handleMetricChange = (key, value) => {
        const updated = { ...localData, metrics: { ...localData.metrics, [key]: value }};
        setLocalData(updated);
        onUpdateNode(updated);
      };

      const handleNotesChange = (value) => {
        const updated = { ...localData, notes: value };
        setLocalData(updated);
        onUpdateNode(updated);
      };

      return (
        <div className={`modal-overlay ${node ? 'active' : ''}`} onClick={onClose}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title-area">
                <div className="modal-avatar" style={{color: node.party === 'democrat' ? '#60a5fa' : '#f87171', borderColor: node.party === 'democrat' ? '#2563eb' : '#dc2626'}}>
                  {node.name.split(' ').map(n=>n[0]).join('')}
                </div>
                <div className="modal-title">
                  <h2>{node.name}</h2>
                  <p>{node.role}</p>
                </div>
              </div>
              <button className="btn-close" onClick={onClose}>✕</button>
            </div>
            
            <div className="metrics-grid">
              <div className="metric-card">
                <label>Funds Raised</label>
                <input className="metric-input" value={localData.metrics.funds} onChange={(e) => handleMetricChange('funds', e.target.value)} />
              </div>
              <div className="metric-card">
                <label>Doors Knocked</label>
                <input className="metric-input" value={localData.metrics.doors} onChange={(e) => handleMetricChange('doors', e.target.value)} />
              </div>
              <div className="metric-card">
                <label>Volunteers</label>
                <input className="metric-input" value={localData.metrics.volunteers} onChange={(e) => handleMetricChange('volunteers', e.target.value)} />
              </div>
              <div className="metric-card">
                <label>Calls Made</label>
                <input className="metric-input" value={localData.metrics.calls} onChange={(e) => handleMetricChange('calls', e.target.value)} />
              </div>
            </div>

            <div className="notes-section">
              <label>Strategic Notes & Intel</label>
              <textarea 
                className="notes-textarea" 
                value={localData.notes} 
                onChange={(e) => handleNotesChange(e.target.value)}
                placeholder="Enter field notes, opposition research, or internal metrics here..."
              ></textarea>
            </div>
          </div>
        </div>
      )
    }

    // --- Main App ---

    function App() {
      const [nodes, setNodes] = useState(MOCK_NODES);
      const [progress, setProgress] = useState(0);
      const [selectedNodeId, setSelectedNodeId] = useState(null);

      // Handle dragging nodes
      const handleDrag = (id, newX, newY) => {
        setNodes(nodes.map(n => n.id === id ? { ...n, x: newX, y: newY } : n));
      };

      // Handle updating node data from modal
      const handleUpdateNode = (updatedNode) => {
        setNodes(nodes.map(n => n.id === updatedNode.id ? updatedNode : n));
      }

      const selectedNode = nodes.find(n => n.id === selectedNodeId);

      return (
        <div className="canvas-container" onClick={() => setSelectedNodeId(null)}>
          <div className="top-brand">
            <h1>Hidalgo Strategy</h1>
            <p>Interactive Alignment Matrix</p>
          </div>
          
          <div className="grid-bg"></div>
          <div className="grid-pattern"></div>
          
          <SVGConnections nodes={nodes} connections={CONNECTIONS} />
          
          <ProgressHub progress={progress} setProgress={setProgress} />

          {nodes.map(node => (
            <Node 
              key={node.id} 
              node={node} 
              isSelected={selectedNodeId === node.id}
              onSelect={(n) => setSelectedNodeId(n.id)}
              onDrag={handleDrag}
            />
          ))}

          <Modal 
            node={selectedNode} 
            onClose={() => setSelectedNodeId(null)} 
            onUpdateNode={handleUpdateNode}
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
